name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      - run: npm test

      # First publish uses NPM_TOKEN (granular access token).
      # After the package exists on npm, configure Trusted Publishing
      # at https://www.npmjs.com/package/snapeval/access and remove
      # the NODE_AUTH_TOKEN line below.
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
