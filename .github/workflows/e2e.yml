name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  e2e:
    name: E2E (Copilot CLI)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || !github.event.pull_request.head.repo.fork }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Run E2E tests
        run: |
          if compgen -G "tests/e2e/*.test.ts" > /dev/null; then
            npm run test:e2e
          else
            echo "No E2E test files found, skipping."
          fi
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

  e2e-sdk:
    name: E2E (Copilot SDK)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || !github.event.pull_request.head.repo.fork }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Install Copilot SDK
        run: npm install @github/copilot-sdk

      - name: Run SDK E2E tests
        run: |
          if compgen -G "tests/e2e/copilot-sdk*.test.ts" > /dev/null; then
            npx vitest run --config vitest.e2e.config.ts tests/e2e/copilot-sdk-flow.test.ts
          else
            echo "No SDK E2E test files found, skipping."
          fi
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
