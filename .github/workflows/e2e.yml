name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  e2e-cli:
    name: E2E (CLI)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || !github.event.pull_request.head.repo.fork }}
    env:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci && npm run build
      - run: npm install -g @github/copilot
      - run: npx vitest run --config vitest.e2e.config.ts tests/e2e/cli-flow.test.ts

  e2e-plugin:
    name: E2E (Plugin)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || !github.event.pull_request.head.repo.fork }}
    env:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
      GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci && npm run build
      - run: npm install -g @github/copilot
      - run: copilot plugin install ./
      - run: npx vitest run --config vitest.e2e.config.ts tests/e2e/plugin-flow.test.ts

  e2e-sdk:
    name: E2E (SDK)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || !github.event.pull_request.head.repo.fork }}
    env:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci && npm run build
      - run: npm install -g @github/copilot
      - run: npm install @github/copilot-sdk
      - run: npx vitest run --config vitest.e2e.config.ts tests/e2e/sdk-flow.test.ts
